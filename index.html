<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I'm Sorry ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:linear-gradient(135deg,#ffd6e7,#fff0f5);
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
position:relative;
}

/* Music Button */
#musicToggle {
position: fixed;
top: 20px;
right: 20px;
z-index: 100;
background: rgba(255, 255, 255, 0.8);
border: 1px solid #ff69b4;
border-radius: 50%;
width: 50px;
height: 50px;
cursor: pointer;
display: flex;
justify-content:center;
align-items: center;
font-size: 20px;
box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

/* Floating Tulips */
.tulip{
position:absolute;
font-size:30px;
animation:float 8s linear infinite;
opacity:0.8;
pointer-events: none;
}

@keyframes float{
0%{ transform:translateY(100vh) rotate(0deg); opacity:0; }
20%{ opacity:1; }
100%{ transform:translateY(-10vh) rotate(360deg); opacity:0; }
}

.container{
background:rgba(255,255,255,0.4);
backdrop-filter:blur(10px);
padding:40px;
border-radius:25px;
text-align:center;
width:90%;
max-width:500px;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
animation:pop 1s ease;
position:relative;
z-index:2;
border: 1px solid rgba(255,255,255,0.3);
}

/* Added Photo Styling */
.profile-photo {
width: 150px;
height: 150px;
object-fit: cover;
border-radius: 50%;
border: 4px solid #ff69b4;
margin-bottom: 20px;
box-shadow: 0 4px 15px rgba(214, 51, 132, 0.2);
}

@keyframes pop{
from{transform:scale(0.7);opacity:0;}
to{transform:scale(1);opacity:1;}
}

h1{ font-size:2.4rem; color:#d63384; margin-bottom:15px; }
p{ font-size:1.15rem; color:#444; margin-bottom:25px; line-height:1.6; }

button.main-btn {
padding: 14px 28px;
border: none;
border-radius: 30px;
background: #ff69b4;
color: white;
font-size: 1rem;
cursor: pointer;
transition: 0.3s;
margin: 8px;
box-shadow: 0 5px 15px rgba(255,105,180,0.4);
}

button.main-btn:hover { transform: scale(1.08); background: #ff1493; }
.hidden { display: none; }
#finalMessage { margin-top: 20px; font-size: 1.3rem; color: #d63384; font-weight: bold; }
</style>
</head>

<body>

<button id="musicToggle" onclick="toggleMusic()">🎵</button>
<audio id="bgMusic" loop>
    <source src="Music.mp3" type="audio/mpeg">
</audio>

<div class="container">

<div id="screen1">
<img src="photo.jpg" alt="Special Memory" class="profile-photo">

<h1>I'm Sorry 🌷</h1>
<p>
My love Blessing, I know I messed up and I hate knowing I hurt you.  
You mean so much to me, and I never want to be the reason for your sadness.  
Please hear my heart. ❤️
</p>
<button class="main-btn" onclick="startExperience()">Tap Me 🌷</button>
</div>

<div id="screen2" class="hidden">
<img src="photo.JPG" alt="Special Memory" class="profile-photo">

<h1>Will You Forgive Me? 💖</h1>
<p>I truly care about you and I want to make things right.</p>
<button class="main-btn" onclick="forgiveYes()">Yes 💕</button>
<button class="main-btn" onclick="forgiveNo()">No 😢</button>
<div id="finalMessage"></div>
</div>

</div>

<script>
const music = document.getElementById("bgMusic");
const musicBtn = document.getElementById("musicToggle");

function toggleMusic() {
    if (music.paused) {
        music.play();
        musicBtn.innerHTML = "⏸️";
    } else {
        music.pause();
        musicBtn.innerHTML = "🎵";
    }
}

function startExperience() {
    music.play().then(() => {
        musicBtn.innerHTML = "⏸️";
    }).catch(e => console.log("Audio blocked"));

    document.getElementById("screen1").style.display = "none";
    document.getElementById("screen2").style.display = "block";
}

function forgiveYes(){
    document.getElementById("finalMessage").innerHTML = "Thank you my love 😭💖 I promise to do better 🌷";
}

function forgiveNo(){
    document.getElementById("finalMessage").innerHTML = "I'll keep trying until I earn it 🥺🌷";
}

function createTulip(){
    const tulip = document.createElement("div");
    tulip.classList.add("tulip");
    tulip.innerHTML = "🌷";
    tulip.style.left = Math.random()*100 + "vw";
    tulip.style.animationDuration = (5 + Math.random()*5) + "s";
    tulip.style.fontSize = (20 + Math.random()*25) + "px";
    document.body.appendChild(tulip);
    setTimeout(() => tulip.remove(), 9000);
}

setInterval(createTulip, 400);
</script>

</body>
</html>
